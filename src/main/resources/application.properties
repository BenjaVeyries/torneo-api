spring.application.name=torneo-api

# Local fallback database so the app can run without MySQL installed.
# You can override these values with SPRING_DATASOURCE_* env vars when needed.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/torneo_api;MODE=MySQL;DB_CLOSE_DELAY=FALSE;DATABASE_TO_LOWER=TRUE;AUTO_SERVER=TRUE}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.H2Dialect}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
